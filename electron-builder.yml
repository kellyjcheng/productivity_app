appId: com.kellycheng.wooperdashboard
productName: Wooper Dashboard
asar: true
directories:
  output: dist-electron
files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
