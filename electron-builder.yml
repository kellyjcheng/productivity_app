# CLAUDE CODE INSTRUCTIONS — electron-builder.yml
#
# Configure electron-builder for packaging the app on Windows, Mac, and Linux.
#
# TASKS:
# Set appId: com.yourname.wooperdashboard
# Set productName: Wooper Dashboard
# Set directories.output to 'dist-electron'
# Configure targets:
#   win: target: nsis (installer)
#   mac: target: dmg
#   linux: target: AppImage
# Set icon paths:
#   win: build/icon.ico
#   mac: build/icon.icns
#   linux: build/icon.png
# Add asar: true
# Add files: ["dist/**/*", "dist-electron/**/*"]